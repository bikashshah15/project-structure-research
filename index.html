<style>
  :root {
    --ink: #0f172a;
    --ink-soft: #334155;
    --rule: #cbd5e1;
    --rule-soft: #e2e8f0;
    --paper: #fbfbf9;
  }
  html, body { background: var(--paper); color: var(--ink); }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; font-feature-settings: "ss01", "cv11"; }
  .serif { font-family: 'Source Serif 4', Georgia, serif; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  /* Connector lines */
  .conn-v { width: 1px; background: var(--rule); }
  .conn-h { height: 1px; background: var(--rule); }
  .arrow-down::after {
    content: "";
    position: absolute;
    left: 50%; bottom: -1px;
    transform: translate(-50%, 0);
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--rule);
  }
  /* Diamond */
  .diamond {
    position: relative;
    width: 220px;
    height: 110px;
  }
  .diamond-inner {
    position: absolute;
    inset: 0;
    transform: rotate(45deg);
    border: 1.25px solid var(--ink);
    background: #fff;
  }
  .diamond-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 15px;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  /* Phase band */
  .band {
    border-left: 3px solid var(--band-accent, #475569);
    background: var(--band-bg, #f8fafc);
  }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  /* Hide focus outlines but keep keyboard ring */
  button:focus-visible, [role="button"]:focus-visible { outline: 2px solid #0f172a; outline-offset: 2px; }
  /* Subtle paper texture */
  .paper-grid {
    background-image:
      linear-gradient(to right, rgba(15,23,42,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(15,23,42,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .num-tab {
    font-family: 'Source Serif 4', serif;
    font-variant-numeric: tabular-nums;
  }
  /* Smooth expand */
  .node-detail { animation: expand 180ms ease-out; transform-origin: top; }
  @keyframes expand {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Cell-hover highlighting of flow lanes ---------- */
  .flow-root [data-lane] { transition: opacity 180ms ease, box-shadow 180ms ease, filter 180ms ease; }

  /* A lane is highlighted iff (1) any generator is hovered AND lane matches it,
     OR (2) any analyzer is hovered AND lane matches it.
     Otherwise (when ANY hover is active) it's dimmed. */
  .flow-root[data-gh] [data-lane="syft"]    { opacity: 0.22; filter: saturate(0.4); }
  .flow-root[data-gh] [data-lane="vops"]    { opacity: 0.22; filter: saturate(0.4); }
  .flow-root[data-ah] [data-lane="bombot"]  { opacity: 0.22; filter: saturate(0.4); }
  .flow-root[data-ah] [data-lane="trust"]   { opacity: 0.22; filter: saturate(0.4); }
  .flow-root[data-gh="syft"]   [data-lane="syft"],
  .flow-root[data-gh="vops"]   [data-lane="vops"],
  .flow-root[data-ah="bombot"] [data-lane="bombot"],
  .flow-root[data-ah="trust"]  [data-lane="trust"] {
    opacity: 1; filter: none;
  }
  .flow-root[data-gh="syft"]   [data-lane="syft"] .lane-card,
  .flow-root[data-gh="vops"]   [data-lane="vops"] .lane-card,
  .flow-root[data-ah="bombot"] [data-lane="bombot"] .lane-card,
  .flow-root[data-ah="trust"]  [data-lane="trust"] .lane-card {
    box-shadow: 0 0 0 2px var(--hl, #1d4ed8), 0 6px 24px -10px rgba(29,78,216,0.35);
    border-radius: 2px;
  }
  .flow-root[data-gh="syft"]   [data-lane="syft"] .lane-tag,
  .flow-root[data-gh="vops"]   [data-lane="vops"] .lane-tag,
  .flow-root[data-ah="bombot"] [data-lane="bombot"] .lane-tag,
  .flow-root[data-ah="trust"]  [data-lane="trust"] .lane-tag {
    background: var(--hl, #1d4ed8) !important;
    color: #fff !important;
    border-color: var(--hl, #1d4ed8) !important;
  }

  /* Matrix cell */
  .cell {
    border: 1px solid var(--rule);
    background: #fff;
    transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    cursor: pointer;
  }
  .cell:hover, .cell[data-active="true"] {
    border-color: var(--hl, #1d4ed8);
    background: color-mix(in oklab, var(--hl, #1d4ed8) 6%, #fff);
  }
  .cell-bar {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--hl, #1d4ed8) 0 50%, var(--hl2, #6d28d9) 50% 100%);
  }

  /* ---------- Sticky design panel: full at top, compact while reading ---------- */
  .design-sticky {
    overflow-anchor: none;
    transition: background 240ms ease, box-shadow 240ms ease;
  }
  .design-sticky[data-compact="true"] {
    box-shadow: 0 14px 30px -28px rgba(15, 23, 42, 0.65);
  }
  .design-matrix-card,
  .design-matrix-header,
  .design-matrix-body,
  .design-matrix-hint {
    transition:
      max-height 260ms ease,
      opacity 180ms ease,
      padding 260ms ease,
      box-shadow 240ms ease,
      border-color 240ms ease;
  }
  .design-matrix-body {
    max-height: 520px;
    opacity: 1;
    overflow: hidden;
    overflow-anchor: none;
  }
  .design-sticky[data-compact="true"] .design-matrix-header {
    padding-top: 10px;
    padding-bottom: 10px;
  }
  .design-sticky[data-compact="true"] .design-matrix-body {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
    pointer-events: none;
  }
  .design-sticky[data-compact="true"] .design-matrix-card {
    box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04), 0 14px 28px -24px rgba(15, 23, 42, 0.45);
  }
  .design-sticky[data-compact="true"] .design-matrix-hint {
    opacity: 0.78;
  }
  @media (prefers-reduced-motion: reduce) {
    .design-sticky,
    .design-matrix-card,
    .design-matrix-header,
    .design-matrix-body,
    .design-matrix-hint {
      transition: none !important;
    }
  }

  /* ---------- Walkthrough avatar + active node ---------- */
  .walk-active { position: relative; }
  .walk-active > .lane-card,
  .walk-active .lane-card {
    box-shadow: 0 0 0 3px #f59e0b, 0 14px 36px -14px rgba(245,158,11,0.55) !important;
    background: #fffbeb !important;
    border-color: #f59e0b !important;
  }
  .walk-avatar {
    position: absolute;
    left: -34px; top: 18px;
    width: 22px; height: 22px;
    border-radius: 999px;
    background: radial-gradient(circle at 35% 30%, #fcd34d 0%, #f59e0b 60%, #b45309 100%);
    box-shadow: 0 0 0 4px rgba(245,158,11,0.22), 0 0 0 9px rgba(245,158,11,0.10);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
    z-index: 5;
    animation: walk-pulse 1.8s ease-in-out infinite;
  }
  @keyframes walk-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }

  /* ---------- Acronym tooltip styling ---------- */
  abbr.acr {
    text-decoration: underline dotted #94a3b8;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    cursor: help;
  }
  abbr.acr:hover { text-decoration-color: #0f172a; color: #0f172a; }

  /* ---------- Phase entrance animation ---------- */
  .phase-enter { animation: phase-in 520ms cubic-bezier(.2,.7,.2,1) both; }
  .phase-enter-1 { animation-delay: 0ms; }
  .phase-enter-2 { animation-delay: 90ms; }
  .phase-enter-3 { animation-delay: 180ms; }
  .phase-enter-4 { animation-delay: 270ms; }
  @keyframes phase-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .phase-enter { animation: none !important; }
    .node-detail { animation: none !important; }
  }

  /* ---------- Projector / 1080p readability ---------- */
  @media (min-width: 1500px) {
    .stage-root { max-width: 1240px !important; }
    body { font-size: 16px; }
  }

  /* ---------- Print / PDF export ---------- */
  @media print {
    @page { size: A3 portrait; margin: 18mm 14mm; }
    html, body { background: #fff !important; }
    body { font-size: 11pt; }
    .no-print, .no-print * { display: none !important; }
    .sticky { position: static !important; }
    .flow-root { display: block !important; }
    /* expand every collapsed node so committees can read it on paper */
    .node-detail { display: block !important; animation: none !important; }
    .lane-card { break-inside: avoid; page-break-inside: avoid; box-shadow: none !important; }
    .band { break-inside: avoid-page; }
    section.band { page-break-inside: avoid; }
    section.band + section.band { page-break-before: always; }
    .phase-enter { animation: none !important; opacity: 1 !important; transform: none !important; }
    /* Hide hover-dimming so the printed copy shows every lane crisp */
    .flow-root[data-gh] [data-lane],
    .flow-root[data-ah] [data-lane] { opacity: 1 !important; filter: none !important; }
    .walk-active > .lane-card,
    .walk-active .lane-card { background: #fff !important; box-shadow: none !important; }
    .walk-avatar { display: none !important; }
    abbr.acr { text-decoration: none; color: inherit; cursor: text; }
    /* surface tooltip content as inline footnote on print */
    abbr.acr::after { content: " (" attr(title) ")"; font-size: 0.78em; color: #475569; font-style: italic; }
    a { color: inherit; text-decoration: none; }
  }
  .walk-strip {
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 2px;
  }
</style>
</head>

    return (
      <a
        href={url}
        target="_blank"
        rel="noopener noreferrer"

function RealShot({ kind }) {
  const src = SCREENSHOT_MAP[kind];

  if (missing) {
    return (
      <div className="w-full h-full flex items-center justify-center bg-amber-50 border border-dashed border-amber-300 text-amber-900 px-2 py-1 text-center">

    );
  }
  return (
    <img
      src={src}
      alt={kind}
      loading="lazy"
      className="w-full h-full object-contain bg-white"
      onError={() => setMissing(true)}
    />
  );
}

const ACR = {
  SBOM:       "Software Bill of Materials — machine-readable inventory of every component in a software build.",
  SPDX:       "Software Package Data Exchange — ISO/IEC 5962 standard SBOM format (Linux Foundation).",
  CycloneDX:  "OWASP SBOM and security exchange format (cdx-json).",
  CVE:        "Common Vulnerabilities and Exposures — public identifier for a software vulnerability.",
  CVSS:       "Common Vulnerability Scoring System — 0–10 numeric severity for a CVE.",
  DOI:        "Digital Object Identifier — persistent reference for an archived digital artifact.",
  SIS:        "Study Information Sheet — IRB-approved one-pager sent to participants before the session.",
  "NASA-TLX": "NASA Task Load Index — 6-item subjective workload instrument (mental, physical, temporal demand; performance; effort; frustration).",

  ReDoS:      "Regular-expression Denial of Service — vulnerability class.",
  UNCC:       "University of North Carolina at Charlotte.",

};

    emerald: "bg-white border-emerald-900/70",

    <div className="w-full">

function tallyUpTo(script, idx) {
  let scr = 0, tlx = 0, qual = 0, mins = 0, audio = false;
  for (let i = 0; i <= idx; i++) {
    const s = script[i]; if (!s) break;
    if (s.scr) scr++;
    if (s.tlx) tlx++;
    if (s.qual) qual++;
    mins += s.mins || 0;
    if (s.audio) audio = true;
    if (s.audioOff) audio = false;
  }
  return { scr, tlx, qual, mins, audio };
}

function StudyFlow() {
  const [open, setOpen] = useState(() => new Set());
  const toggle = useCallback((id) => {
    setOpen(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }, []);
  const isOpen = (id) => open.has(id);

  const [expandAll, setExpandAll] = useState(false);
  const allIds = useMemo(() => Array.from(document.querySelectorAll("[data-nid]")).map(n=>n.dataset.nid), [expandAll]);

  /* Helper that wires id → toggle */
  const N = (props) => (
    <div data-nid={props.id} className={activeNid===props.id ? "walk-active" : ""}>
      <Node {...props} expanded={isOpen(props.id)} onToggle={toggle} />
      {activeNid===props.id && <span className="walk-avatar" aria-hidden="true">P</span>}
    </div>
  );

  const [hover, setHover] = useState(null); // {gen, ana} | null
  const [designCompact, setDesignCompact] = useState(false);
  const lastDesignToggleAt = useRef(0);
  const rootAttrs = {};
  if (hover?.gen) rootAttrs["data-gh"] = hover.gen;
  if (hover?.ana) rootAttrs["data-ah"] = hover.ana;

  useEffect(() => {
    const COLLAPSE_AT = 140;
    const EXPAND_AT = 12;
    const TOGGLE_COOLDOWN_MS = 420;
    let ticking = false;
    const update = () => {
      ticking = false;
      const y = window.scrollY || document.documentElement.scrollTop || 0;
      const now = window.performance ? window.performance.now() : Date.now();
      setDesignCompact(prev => {
        if (!prev && y > COLLAPSE_AT) {
          lastDesignToggleAt.current = now;
          return true;
        }
        if (prev && y < EXPAND_AT && now - lastDesignToggleAt.current > TOGGLE_COOLDOWN_MS) {
          lastDesignToggleAt.current = now;
          return false;
        }
        return prev;
      });
    };
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(update);
    };
    update();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  // Walkthrough state
  const [walkOn, setWalkOn] = useState(false);
  const [order, setOrder] = useState(1);
  const [stepIdx, setStepIdx] = useState(0);
  const script = useMemo(() => buildScript(order), [order]);
  const activeNid = walkOn ? (script[stepIdx]?.anchor) : null;

  useEffect(() => {
    if (!walkOn) return;
    const onKey = (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === "ArrowRight") { e.preventDefault(); setStepIdx(i => Math.min(script.length-1, i+1)); }
      if (e.key === "ArrowLeft")  { e.preventDefault(); setStepIdx(i => Math.max(0, i-1)); }
      if (e.key === "Escape") setWalkOn(false);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [walkOn, script.length]);

  useEffect(() => {
    if (!walkOn || !activeNid) return;
    const el = document.querySelector('[data-nid="' + activeNid + '"]');
    if (!el) return;
    const r = el.getBoundingClientRect();
    const sticky = document.querySelector("[data-design-sticky]");
    const stickyOffset = sticky ? sticky.getBoundingClientRect().height + 28 : 140;
    const targetY = window.scrollY + r.top - stickyOffset;
    window.scrollTo({ top: targetY, behavior: "smooth" });
  }, [activeNid, walkOn]);

  return (
    <div className="stage-root max-w-[1100px] mx-auto px-6 pb-10">
      <div className="design-sticky sticky top-0 z-30 pt-4 pb-3 -mx-6 px-6 no-print"
           data-design-sticky
           data-compact={designCompact ? "true" : "false"}
           style={{ background: "linear-gradient(to bottom, rgba(251,251,249,1) 0%, rgba(251,251,249,1) 88%, rgba(251,251,249,0) 100%)" }}>
        <Matrix hover={hover} setHover={setHover} compact={designCompact} />
        <div className="mt-2 flex items-center gap-3">
          <button
            type="button"
            onClick={() => setWalkOn(v => !v)}
            aria-pressed={walkOn}
            className={"mono text-[11px] uppercase tracking-[0.14em] px-3 py-1.5 rounded-sm border transition flex items-center gap-1.5 " + (walkOn ? "bg-amber-500 text-white border-amber-600" : "bg-white text-slate-800 border-slate-300 hover:border-slate-700")}>
            <span className={"inline-block w-2 h-2 rounded-full " + (walkOn ? "bg-white" : "bg-amber-500")} />
            {walkOn ? "Stop Walkthrough" : "Walkthrough Mode"}
          </button>
          <button
            type="button"
            onClick={() => window.print()}
            className="mono text-[11px] uppercase tracking-[0.14em] px-3 py-1.5 rounded-sm border bg-white text-slate-800 border-slate-300 hover:border-slate-700 transition flex items-center gap-1.5"
            title="Open print dialog — expands every node and paginates by phase"
          >
            <svg viewBox="0 0 24 24" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
            Print / Export PDF
          </button>
          {walkOn && (
            <span className="text-[11px] text-slate-600">
              <span className="mono text-slate-400">← / →</span> step · <span className="mono text-slate-400">Esc</span> exit · panel on the right
            </span>
          )}
        </div>
      </div>

      {walkOn && (
        <WalkthroughPanel order={order} setOrder={setOrder} idx={stepIdx} setIdx={setStepIdx} script={script} onClose={() => setWalkOn(false)} />
      )}

      <div className="flow-root" {...rootAttrs}>

               <div className="space-y-1">
                 <div className="mono text-[11.5px] text-slate-700 bg-slate-50 border border-slate-200 rounded-sm px-2 py-1.5">
                   ~/study/repo &nbsp;·&nbsp; sb-3f097ade….ecs.us-east-1.on.aws (V-Ops) &nbsp;·&nbsp; bombot.vercel.app &nbsp;·&nbsp; d3nclnp83x4i9u.cloudfront.net (Trustify)
                 </div>
                 <div>Browser is reset between participants (fresh profile); clipboard cleared.</div>
               </div>
             } />

          <N id="counterbalance" icon={I.Grid2x2} title="Counterbalance assignment"
             sub="2 × 2 within-subjects, Latin-square order (generator × analyzer)"
             instrument="assignment"
             detail={
               <div>
                 Researcher reads next-row from the pre-randomized assignment sheet (sealed envelope per P##).
                 Order is the only between-participant variable.
               </div>
             } />
        </VStack>
      </PhaseBand>

      <Connector h={22} />

      {/* ============================ PHASE II ============================ */}
      <PhaseBand phase={PHASES.P2}>
        <VStack gap={14}>
          <N id="intro-genA" icon={I.FileText} title="Qualtrics intro screen for Generator A"
             sub={<><QualtricsPlaceholder slot="INTRO_GENA" /> &nbsp;·&nbsp; task card + redirect link to assigned tool</>}
             instrument="qualtrics"
             tone="blue"
             detail={<>Single-page task card. Includes scenario framing (“you are evaluating SBOM tooling for your team”), success criteria, and a one-click redirect.</>} />

          <div className="flex flex-col items-center">
            <Diamond label="Generator A?" leftLabel="Syft" rightLabel="V-Ops" />
          </div>

          {/* parallel generator lanes */}
          <TwoLanes
            accent={PHASES.P2.accent}
            axis="gen"
            leftLane="syft"
            rightLane="vops"
            leftHeader="Lane A · Syft (CLI)"
            rightHeader="Lane B · V-Ops (Web)"
            left={
              <VStack gap={10}>
                <N id="syft-1" icon={I.Terminal} tone="blue"
                   title="Open terminal at ~/study/repo"
                   sub="CLI tool — no URL. Researcher confirms syft is on PATH."
                   screenshot="scr. 1 — syft cli prompt"
                   detail={
                     <div className="text-[12.5px] text-slate-700 leading-relaxed space-y-1.5">
                       <div className="font-semibold text-slate-900">Participant navigation — Syft (CLI)</div>
                       <ol className="list-decimal pl-5 space-y-0.5">
                         <li><span className="mono">cd ~/study/repo</span></li>
                         <li><span className="mono">syft scan dir:. -o spdx-json=sbom.spdx.json</span></li>
                         <li>Confirm <span className="mono">sbom.spdx.json</span> is created in the repo root.</li>
                         <li>Verify the file opens and contains <span className="mono">spdxVersion</span>, <span className="mono">SPDXID</span>, <span className="mono">documentNamespace</span>.</li>
                         <li className="text-slate-500 italic">(V-Ops backend uses the same <span className="mono">SbomValidator</span> for its generator path — see SpringbootAPP.txt.)</li>
                       </ol>
                       <div className="text-slate-500 italic">Source: Syft docs + SpringbootAPP.txt.</div>
                     </div>
                   } />
                <N id="syft-2" icon={I.FileText} tone="blue"
                   title="Read task card"
                   sub={<>“Generate <Acr code="SPDX" /> JSON <Acr code="SBOM" /> with Syft”</>} />
                <N id="syft-3" icon={I.Play} tone="blue"
                   title="Run syft command"
                   sub="self-discovered or provided per protocol"
                   detail={
                     <div className="space-y-1">
                       <div>Protocol branch P-Discover: participant must locate the command via docs.</div>
                       <div>Protocol branch P-Provide: command is printed on the task card.</div>
                       <div className="mono text-[11.5px] bg-slate-50 border border-slate-200 rounded-sm px-2 py-1">
                         syft ~/study/repo -o spdx-json &gt; ~/study/sbom.spdx.json
                       </div>
                     </div>
                   } />
                <N id="syft-4" icon={I.Save} tone="blue"
                   title={<>Save <Acr code="SBOM" /> to ~/study/sbom.spdx.json</>}
                   screenshot="scr. 2 — output file" />
              </VStack>
            }
            right={
              <VStack gap={10}>
                <N id="vops-1" icon={I.Globe} tone="blue"
                   title="Open V-Ops in browser tab"
                   sub={<>URL: <ToolLink href={TOOL_URLS.vops}>sb-3f097ade….ecs.us-east-1.on.aws</ToolLink> &nbsp;·&nbsp; endpoint <span className="mono text-slate-500">POST /api/sbom</span></>}
                   detail={
                     <div className="text-[12.5px] text-slate-700 leading-relaxed space-y-1.5">
                       <div className="font-semibold text-slate-900">Participant navigation — V-Ops (Web)</div>
                       <ol className="list-decimal pl-5 space-y-0.5">
                         <li>Open <ToolLink href={TOOL_URLS.vops}>V-Ops on AWS</ToolLink> in a fresh browser tab.</li>
                         <li>Paste the assigned public HTTPS Git URL into the form.</li>
                         <li>Select publication mode: <span className="mono">FULL_SBOM_PUBLIC</span> (study default).</li>
                         <li>Submit. Watch the run page: <span className="mono">queued → cloning → generating → publishing</span>.</li>
                         <li>When done, the page shows: SPDX JSON SBOM, SWID tag, combined artifact, and Zenodo DOI link.</li>
                         <li>Save the artifact filename for the analyzer step.</li>
                       </ol>
                       <div className="text-slate-500 italic">Source: SpringbootAPP.txt — <span className="mono">POST /api/sbom</span> flow.</div>
                     </div>
                   } />
                <N id="vops-2" icon={I.Upload} tone="blue"
                   title="Paste public Git URL of assigned repo"
                   sub="select publication mode" />
                <N id="vops-3" icon={I.Play} tone="blue"
                   title="Submit and watch run status"
                   screenshot="scr. 1 — V-Ops run page" />
                <N id="vops-4" icon={I.Download} tone="blue"
                   title={<>Download <Acr code="SBOM" /> artifact</>}
                   sub={<>or copy <Acr code="DOI" /> link</>}
                   screenshot="scr. 2 — artifact" />
              </VStack>
            }
          />

          <MergeIn accent={PHASES.P2.accent} />

          <N id="tlx-genA" icon={I.Gauge} tone="blue"
             title="Return to Qualtrics — Generator A measures"
             sub={<><QualtricsPlaceholder slot="TLX_GENA" /> &nbsp;·&nbsp; <Acr code="NASA-TLX" /> (raw, 6 items) + trust + perceived success</>}
             instrument="qualtrics"
             detail={<TlxBattery scope="Generator A" slot="TLX_GENA" />} />

          {/* Analyzer */}
          <N id="intro-anaA" icon={I.FileText} tone="blue"
             title="Qualtrics intro screen for Analyzer A"
             sub={<><QualtricsPlaceholder slot="INTRO_ANAA" /> &nbsp;·&nbsp; task card + redirect link</>} />

          <div className="flex flex-col items-center">
            <Diamond label="Analyzer A?" leftLabel="BOMbot" rightLabel="Trustify" />
          </div>

          <TwoLanes
            accent={PHASES.P2.accent}
            axis="ana"
            leftLane="bombot"
            rightLane="trust"
            leftHeader="Lane A · BOMbot (Chat)"
            rightHeader="Lane B · Trustify (Dashboard)"
            left={
              <VStack gap={10}>
                <N id="bomb-1" icon={I.Globe} tone="blue"
                   title="Open BOMbot in browser tab"
                   sub={<>URL: <ToolLink href={TOOL_URLS.bombot} /></>}
                   detail={
                     <div className="text-[12.5px] text-slate-700 leading-relaxed space-y-1.5">
                       <div className="font-semibold text-slate-900">Participant navigation — BOMbot</div>
                       <ol className="list-decimal pl-5 space-y-0.5">
                         <li>Open <ToolLink href={TOOL_URLS.bombot}>bombot.vercel.app</ToolLink> in a fresh browser tab.</li>
                         <li>Confirm the chat interface and upload area are visible. No login required.</li>
                         <li>Drag-and-drop the researcher-provided SPDX JSON SBOM, or use the file picker.</li>
                         <li>Wait for the instant vulnerability summary (severity-coded cards).</li>
                         <li>Use chat to ask: <em>“Which vulnerability should I fix first?”</em></li>
                         <li>Open the OSV.dev evidence link for the vulnerability you select.</li>
                       </ol>
                       <div className="text-slate-500 italic">Source: BOMbot Navigation Report §3, §9.</div>
                     </div>
                   } />
                <N id="bomb-2" icon={I.Upload} tone="blue"
                   title={<>Drag-and-drop <Acr code="SBOM" /></>}
                   screenshot="scr. 3 — upload state" />
                <N id="bomb-3" icon={I.Bug} tone="blue"
                   title="Read instant vulnerability summary"
                   sub="severity-coded cards" />
                <N id="bomb-4" icon={I.MessageCircle} tone="blue"
                   title="Ask AI follow-up"
                   sub="identify a vulnerable dependency"
                   screenshot="scr. 4 — chat answer" />
                <N id="bomb-5" icon={I.Wrench} tone="blue"
                   title="Ask AI for mitigation"
                   screenshot="scr. 5 — remediation" />
              </VStack>
            }
            right={
              <VStack gap={10}>
                <N id="trust-1" icon={I.ShieldCheck} tone="blue"
                   title="Open Trustify dashboard in browser tab"
                   sub={<>URL: <ToolLink href={TOOL_URLS.trustify} /> &nbsp;·&nbsp; CloudFront HTTPS — no login required</>}
                   detail={
                     <div className="text-[12.5px] text-slate-700 leading-relaxed space-y-1.5">
                       <div className="font-semibold text-slate-900">Participant navigation — Trustify (Dashboard)</div>
                       <ol className="list-decimal pl-5 space-y-0.5">
                         <li>Open <ToolLink href={TOOL_URLS.trustify}>d3nclnp83x4i9u.cloudfront.net</ToolLink> (HTTPS via CloudFront).</li>
                         <li>Confirm the Dashboard loads with <b>6 SBOMs</b> and <b>66 advisories</b>.</li>
                         <li>Note the vulnerability severity bars — larger bars = more vulnerabilities.</li>
                         <li>Click “SBOMs” in the left nav, then pick the assigned SBOM (e.g. <span className="mono">quarkus-bom</span>).</li>
                         <li>Open “Vulnerabilities” to inspect correlated CVEs.</li>
                         <li>Open “Packages” to inspect components contributing to matches.</li>
                         <li className="text-slate-500">The “Unable to connect” warning in a lower panel can be ignored — main data loads.</li>
                       </ol>
                       <div className="text-slate-500 italic">
                         Fallback origin: <ToolLink href={TOOL_URLS.trustify_fallback}>ALB</ToolLink> (HTTP, only if CloudFront is unreachable).
                       </div>
                       <div className="text-slate-500 italic">Source: Trustify User Access and Navigation Report §5, §6, §9.</div>
                     </div>
                   } />
                <N id="trust-2" icon={I.ListChecks} tone="blue"
                   title="Confirm SBOMs and Advisories loaded on the Dashboard"
                   sub="6 SBOMs · 66 advisories · severity bars visible"
                   screenshot="scr. 3 — trustify dashboard" />
                <N id="trust-3" icon={I.FolderPlus} tone="blue"
                   title="Open the SBOMs section, pick the assigned SBOM"
                   sub="e.g. quarkus-bom (largest vulnerability bar)"
                   screenshot="scr. 4 — trustify sbom list" />
                <N id="trust-4" icon={I.Search} tone="blue"
                   title="Open Vulnerabilities and drill into one CVE"
                   sub="read description, affected components, severity"
                   screenshot="scr. 5 — trustify vuln detail" />
                <N id="trust-5" icon={I.BookOpen} tone="blue"
                   title="Record the package, vulnerability ID, and suggested fix"
                   sub="cross-check with the Packages and Advisories tabs" />
              </VStack>
            }
          />

          <MergeIn accent={PHASES.P2.accent} />

          <N id="record-anaA" icon={I.ClipboardList} tone="blue"
             title="Return to Qualtrics — record findings"
             sub={<><QualtricsPlaceholder slot="INTRO_ANAA" /> &nbsp;·&nbsp; dependency, vulnerability, mitigation chosen</>}
             instrument="qualtrics" />

          <N id="tlx-anaA" icon={I.Gauge} tone="blue"
             title={<>Qualtrics: <Acr code="NASA-TLX" /> (raw, 6 items) + trust + perceived success</>}
             sub={<QualtricsPlaceholder slot="TLX_ANAA" />}
             instrument="qualtrics"
             detail={<TlxBattery scope="Analyzer A" slot="TLX_ANAA" />} />
        </VStack>
      </PhaseBand>

      <Connector h={22} />

      {/* ============================ PHASE III ============================ */}
      <PhaseBand phase={PHASES.P3}>
        <VStack gap={16}>
          <N id="washout" icon={I.Pause} tone="indigo"
             title="3-minute washout"
             sub="neutral video / break"
             detail={<>Neutral non-tech short (lab playlist). Researcher minimises conversation to reduce carryover priming.</>} />

          <div className="rounded-sm border border-indigo-900/40 bg-white">
            <button
              type="button"
              onClick={() => toggle("block2")}
              className="w-full text-left px-5 py-4 group"
            >
              <div className="flex items-start gap-3">
                <I.Repeat className="w-5 h-5 mt-0.5 text-indigo-900" />
                <div className="flex-1">
                  <div className="serif font-semibold text-[16px] text-slate-900">
                    Block 2 — repeat with Generator B and Analyzer B
                  </div>
                  <div className="text-[12.5px] text-slate-600 mt-0.5">
                    Same task structure as Block 1 · new repo from matched-pair pool · screenshots 6–10 collected.
                  </div>
                </div>
                <I.ChevronDown className={`w-4 h-4 mt-1 text-slate-400 transition-transform ${isOpen("block2") ? "rotate-180" : ""}`} />
              </div>

              {isOpen("block2") && (
                <div className="node-detail mt-4 pl-8 pr-1">
                  <div className="border-l border-indigo-300 pl-3 text-[12.5px] text-slate-700 leading-relaxed space-y-2">
                    <p>Block 2 mirrors Block 1 step-for-step but with the <em>complementary</em> generator and analyzer per the Latin-square row, and a fresh repo of comparable size/language drawn from the matched-pair pool.</p>
                    <p>Mini-summary of repeated steps:</p>
                    <ol className="list-decimal pl-5 space-y-0.5">
                      <li>Qualtrics intro for Generator B → tool-specific lane → save SBOM.</li>
                      <li>NASA-TLX + trust + perceived success (Generator B).</li>
                      <li>Qualtrics intro for Analyzer B → tool-specific lane → record finding.</li>
                      <li>NASA-TLX + trust + perceived success (Analyzer B).</li>
                    </ol>
                    <p>Screenshot indices 6–10 mirror 1–5; filenames are prefixed <span className="mono">P##_B2_</span>.</p>
                  </div>
                </div>
              )}
            </button>
          </div>
        </VStack>
      </PhaseBand>

      <Connector h={22} />

      {/* ============================ PHASE IV ============================ */}
      <PhaseBand phase={PHASES.P4}>
        <VStack gap={16}>
          <N id="comparative" icon={I.Hash} tone="emerald"
             title="Qualtrics: Comparative Feedback Survey"
             sub={<><QualtricsPlaceholder slot="COMPARATIVE" /> &nbsp;·&nbsp; generator pair, analyzer pair, decision confidence, open-ended</>}
             instrument="qualtrics"
             detail={
               <div className="space-y-3 text-[12.5px]">
                 <div className="flex items-center gap-2 flex-wrap">
                   <span className="serif font-semibold text-slate-900">Comparative Feedback Survey — Qualtrics:</span>
                   <QualtricsPlaceholder slot="COMPARATIVE" />
                 </div>
                 <div className="text-slate-600 italic leading-snug">Post-study survey. Likert items use <span className="font-semibold not-italic">Strongly Disagree → Strongly Agree</span> (7-pt).</div>

                 <div className="bg-white border border-slate-200 rounded-sm p-3 space-y-1">
                   <div className="text-[10.5px] uppercase tracking-[0.14em] text-slate-500 font-semibold">Section A — Generator Comparison <span className="text-slate-400 normal-case font-normal">(Syft vs V-Ops · 6 Likert items)</span></div>
                   <ol className="list-decimal pl-5 serif text-slate-800 space-y-0.5">
                     <li>The SBOM generation step was easy to complete with <b>Syft</b>.</li>
                     <li>The SBOM generation step was easy to complete with <b>V-Ops</b>.</li>
                     <li>I understood what the SBOM contained after using <b>Syft</b>.</li>
                     <li>I understood what the SBOM contained after using <b>V-Ops</b>.</li>
                     <li>I trust the output produced by <b>Syft</b>.</li>
                     <li>I trust the output produced by <b>V-Ops</b>.</li>
                   </ol>
                 </div>

                 <div className="bg-white border border-slate-200 rounded-sm p-3 space-y-1">
                   <div className="text-[10.5px] uppercase tracking-[0.14em] text-slate-500 font-semibold">Section B — Analyzer Comparison <span className="text-slate-400 normal-case font-normal">(BOMbot vs Trustify · 6 Likert items)</span></div>
                   <ol className="list-decimal pl-5 serif text-slate-800 space-y-0.5">
                     <li>I was able to identify a vulnerable dependency using <b>BOMbot</b>.</li>
                     <li>I was able to identify a vulnerable dependency using <b>Trustify</b>.</li>
                     <li>The mitigation guidance was clear in <b>BOMbot</b>.</li>
                     <li>The mitigation guidance was clear in <b>Trustify</b>.</li>
                     <li>I trust the analysis output of <b>BOMbot</b>.</li>
                     <li>I trust the analysis output of <b>Trustify</b>.</li>
                   </ol>
                 </div>

                 <div className="bg-white border border-slate-200 rounded-sm p-3 space-y-1">
                   <div className="text-[10.5px] uppercase tracking-[0.14em] text-slate-500 font-semibold">Section C — Decision Confidence <span className="text-slate-400 normal-case font-normal">(3 Likert items)</span></div>
                   <ol className="list-decimal pl-5 serif text-slate-800 space-y-0.5">
                     <li>I am confident I correctly identified a real vulnerability during the session.</li>
                     <li>I am confident the mitigation I selected would actually resolve the vulnerability.</li>
                     <li>I had enough information to make these decisions without guessing.</li>
                   </ol>
                 </div>

                 <div className="bg-white border border-slate-200 rounded-sm p-3 space-y-1">
                   <div className="text-[10.5px] uppercase tracking-[0.14em] text-slate-500 font-semibold">Forced-Choice Preferences <span className="text-slate-400 normal-case font-normal">(Q16–Q18)</span></div>
                   <ol className="list-decimal pl-5 serif text-slate-800 space-y-1.5" start={16}>
                     <li>
                       If you had to generate an SBOM tomorrow for your own work, which tool would you choose?
                       <ul className="list-disc pl-5 text-[12px] text-slate-600 mt-0.5"><li>Syft</li><li>V-Ops</li><li>Either, no preference</li></ul>
                     </li>
                     <li>
                       If you had to triage SBOM vulnerabilities tomorrow, which tool would you choose?
                       <ul className="list-disc pl-5 text-[12px] text-slate-600 mt-0.5"><li>BOMbot</li><li>Trustify</li><li>Either, no preference</li></ul>
                     </li>
                     <li>
                       Compared to tools you have used before for managing software dependencies, today's tools were:
                       <ul className="list-disc pl-5 text-[12px] text-slate-600 mt-0.5"><li>Much harder to use</li><li>Slightly harder</li><li>About the same</li><li>Slightly easier</li><li>Much easier</li></ul>
                     </li>
                   </ol>
                 </div>

                 <div className="bg-white border border-slate-200 rounded-sm p-3 space-y-1">
                   <div className="text-[10.5px] uppercase tracking-[0.14em] text-slate-500 font-semibold">Section D — Open-Ended <span className="text-slate-400 normal-case font-normal">(Q19–Q22)</span></div>
                   <ol className="list-decimal pl-5 serif text-slate-800 space-y-0.5" start={19}>
                     <li>What part of the SBOM generation step was most confusing?</li>
                     <li>What part of the vulnerability analysis step was most confusing?</li>
                     <li>If you could change one thing about the workflow you went through today, what would it be?</li>
                     <li>Any additional comments?</li>
                   </ol>
                 </div>
               </div>
             } />

          <N id="debrief" icon={I.BookOpen} tone="emerald"
             title="Researcher debrief"
             sub="reveal aims, answer questions"
             detail={<>Reveal: comparison of CLI vs hosted generator (Syft vs V-Ops) and dashboard vs LLM-chat analyzer (Trustify vs BOMbot). Provide reading list. Confirm right-to-withdraw audio/data.</>} />

          <N id="compensation" icon={I.Gift} tone="emerald"
             title="Compensation"
             sub="$25 Amazon gift card (digital, on-the-spot)"
             detail={<>Payment receipt logged in tracker; Prolific bonus released for Prolific-sourced participants.</>} />

          <N id="end" icon={I.Flag} terminal
             title="End of session" />
        </VStack>
      </PhaseBand>

      <footer className="mt-12 pt-6 border-t border-slate-300 text-[11.5px] text-slate-600">
        <div className="grid grid-cols-4 gap-6 mb-5">
          <div>
            <div className="num-tab text-[10px] uppercase tracking-[0.16em] text-slate-500 font-semibold mb-1">Session duration</div>
            <div className="serif text-slate-900 text-[14px] leading-tight">≈ 65 minutes</div>
            <div className="text-slate-500 mt-0.5">8 min screening · 50 min protocol · 7 min debrief / payout</div>
          </div>
          <div>
            <div className="num-tab text-[10px] uppercase tracking-[0.16em] text-slate-500 font-semibold mb-1">Compensation</div>
            <div className="serif text-slate-900 text-[14px] leading-tight">$25 Amazon gift card</div>
            <div className="text-slate-500 mt-0.5">Digital, on-the-spot · Prolific bonus for online recruits · screen-out rate per Prolific policy</div>
          </div>
          <div>
            <div className="num-tab text-[10px] uppercase tracking-[0.16em] text-slate-500 font-semibold mb-1"><Acr code="IRB" /> protocol</div>
            <div className="serif text-slate-900 text-[14px] leading-tight">
              <Acr code="UNCC" /> IRB&nbsp;
              <span className="mono text-[12px] bg-amber-50 border border-amber-300 text-amber-900 px-1 rounded-sm">#XXX-XXXX</span>
            </div>
            <div className="text-slate-500 mt-0.5">Approved <span className="mono">YYYY-MM-DD</span> · expedited review · <Acr code="SIS" /> v1.2 on file <PlaceholderTag /></div>
          </div>
          <div>
            <div className="num-tab text-[10px] uppercase tracking-[0.16em] text-slate-500 font-semibold mb-1">Study contact</div>
            <div className="serif text-slate-900 text-[14px] leading-tight">Principal Investigator</div>
            <div className="text-slate-500 mt-0.5">
              <span className="mono">[name]@charlotte.edu</span> · Dept. of Software &amp; Information Systems
            </div>
            <div className="text-slate-500 mt-0.5">Research compliance: <span className="mono">uncc-irb@charlotte.edu</span></div>
          </div>
        </div>
        <div className="flex items-center justify-between border-t border-slate-200 pt-3 text-[11px] text-slate-500">
          <span className="mono">Fig. 1 · Participant flow · v1.1 · within-subjects 2 × 2 (Syft/V-Ops × BOMbot/Trustify) · Latin-square counterbalanced</span>
          <span className="mono no-print">printed: <span id="print-date">{new Date().toISOString().slice(0,10)}</span></span>
        </div>
      </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StudyFlow />);
</script>
</body>
</html>
